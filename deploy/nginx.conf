# ============================================================
# OpenChatShop Nginx 反向代理配置
# ============================================================
# 用途：TLS 终结、WebSocket 代理、静态资源缓存、速率限制、安全加固
# 使用：与 docker-compose.nginx.yml 配合，放在 deploy/ 目录
# ============================================================

# 隐藏 Nginx 版本号，避免泄露已知漏洞信息
server_tokens off;

# 限流区域定义 -- 按 IP 地址限制 API 请求速率
# 10 req/s，burst 允许短时突发 20 个请求，nodelay 超出立即返回 503
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# 上游服务 -- Docker Compose 中 agent-api 容器
upstream backend {
    server agent-api:8000;
}

# ============================================================
# HTTP -> HTTPS 重定向（监听 80 端口，全部跳转到 443）
# ============================================================
server {
    listen 80;
    server_name _;

    # 所有 HTTP 请求 301 永久重定向到 HTTPS
    return 301 https://$host$request_uri;
}

# ============================================================
# HTTPS 主服务（监听 443 端口）
# ============================================================
server {
    listen 443 ssl;
    server_name _;  # 替换为你的域名，如 shop.example.com

    # ----------------------------------------------------------
    # TLS 证书配置
    # 将证书文件放到 /etc/nginx/ssl/ 目录，或挂载宿主机目录
    # 推荐使用 certbot 自动获取 Let's Encrypt 免费证书
    # ----------------------------------------------------------
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # TLS 协议和加密套件（仅允许 TLS 1.2+，禁用弱加密）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS -- 强制浏览器 1 年内只走 HTTPS（上线后启用）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ----------------------------------------------------------
    # Gzip 压缩 -- 减少 HTTP 传输体积，加快页面加载
    # ----------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;  # 小于 1KB 不压缩，避免反效果
    gzip_vary on;

    # ----------------------------------------------------------
    # 代理通用设置
    # ----------------------------------------------------------
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ----------------------------------------------------------
    # WebSocket 代理 -- 用于实时聊天和坐席后台推送
    # /ws/chat/{session_id}  客户聊天 WebSocket
    # /ws/agent/{agent_id}   坐席后台 WebSocket
    # ----------------------------------------------------------
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # 必须透传 Upgrade 和 Connection 头，否则 WebSocket 握手失败
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # WebSocket 长连接超时 -- 保持 1 小时不中断
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ----------------------------------------------------------
    # 静态资源 -- 前端 JS/CSS/图片/字体，浏览器缓存 7 天
    # 由 FastAPI static files 挂载提供，Nginx 加一层缓存头
    # ----------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://backend;
        expires 7d;
        add_header Cache-Control "public, immutable";

        # 静态资源也需要安全头
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ----------------------------------------------------------
    # Prometheus 指标 -- 仅允许内网访问，防止数据泄露
    # 如果你使用内部 Docker 网络，可以取消注释以下限制
    # ----------------------------------------------------------
    # location /metrics {
    #     proxy_pass http://backend;
    #     allow 10.0.0.0/8;
    #     allow 172.16.0.0/12;
    #     allow 192.168.0.0/16;
    #     deny all;
    # }

    # ----------------------------------------------------------
    # API 端点 -- 限流保护，防止滥用和 DDoS
    # /api/v1/*  所有 REST API
    # ----------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend;
    }

    # ----------------------------------------------------------
    # 默认代理 -- 所有其他请求转发到后端 FastAPI
    # 包括页面路由、健康检查、API 文档等
    # ----------------------------------------------------------
    location / {
        proxy_pass http://backend;
    }
}
