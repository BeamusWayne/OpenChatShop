# Nginx 反向代理覆盖配置
# 用途：在 production compose 之上添加 TLS 终结的 nginx 层
#
# 使用方式：
#   docker compose -f docker-compose.prod.yml -f deploy/docker-compose.nginx.yml up -d
#
# 前提：
#   1. SSL 证书已放到 deploy/ssl/ 目录（cert.pem + key.pem）
#   2. 或通过卷挂载其他宿主机目录
#   3. 修改 deploy/nginx.conf 中的 server_name 为实际域名

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - agent-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
