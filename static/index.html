<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommerceAgent - 智能客服</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#4F46E5;--primary-light:#6366F1;--bg:#F3F4F6;--sidebar:#1E1B4B;--white:#FFF;--gray-100:#F9FAFB;--gray-200:#E5E7EB;--gray-500:#6B7280;--gray-700:#374151;--radius:16px;--shadow:0 1px 3px rgba(0,0,0,.1)}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--gray-700)}
.app{display:flex;height:100%}
/* Sidebar */
.sidebar{width:240px;background:var(--sidebar);color:var(--white);display:flex;flex-direction:column;padding:20px 16px;flex-shrink:0}
.sidebar-logo{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sidebar-logo .icon{font-size:28px}
.sidebar-logo h1{font-size:18px;font-weight:600;letter-spacing:.3px}
.sidebar-sub{font-size:12px;opacity:.6;margin-bottom:24px;padding-left:38px}
.sidebar-status{margin-top:auto;display:flex;align-items:center;gap:8px;font-size:12px;opacity:.8}
.status-dot{width:8px;height:8px;border-radius:50%;background:#EF4444;transition:background .3s}
.status-dot.connected{background:#22C55E}
/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
/* Header */
.header{padding:14px 20px;background:var(--white);border-bottom:1px solid var(--gray-200);font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.header-dot{width:10px;height:10px;border-radius:50%;background:var(--primary)}
/* Messages */
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg-row{display:flex;gap:8px;max-width:80%;animation:fadeUp .25s ease}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-row.bot{align-self:flex-start}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--gray-100)}
.msg-bubble{padding:10px 14px;border-radius:var(--radius);line-height:1.55;font-size:14px;word-break:break-word}
.msg-row.user .msg-bubble{background:var(--primary);color:var(--white);border-bottom-right-radius:4px}
.msg-row.bot .msg-bubble{background:var(--white);border-bottom-left-radius:4px;box-shadow:var(--shadow)}
/* Typing indicator */
.typing-indicator{display:flex;gap:4px;padding:4px 0}
.typing-indicator span{width:7px;height:7px;border-radius:50%;background:var(--gray-500);animation:bounce 1.2s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
/* Suggestions */
.suggestions{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.suggestion-btn{padding:6px 14px;border:1px solid var(--primary);color:var(--primary);border-radius:20px;background:transparent;font-size:13px;cursor:pointer;transition:all .15s}
.suggestion-btn:hover{background:var(--primary);color:var(--white)}
/* Input bar */
.input-bar{padding:12px 20px;background:var(--white);border-top:1px solid var(--gray-200);display:flex;gap:10px;align-items:flex-end}
.input-bar textarea{flex:1;border:1px solid var(--gray-200);border-radius:12px;padding:10px 14px;font-size:14px;font-family:inherit;resize:none;outline:none;max-height:120px;transition:border-color .15s;line-height:1.45}
.input-bar textarea:focus{border-color:var(--primary)}
.send-btn{width:40px;height:40px;border-radius:12px;border:none;background:var(--primary);color:var(--white);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.send-btn:hover{background:var(--primary-light)}
.send-btn:disabled{opacity:.4;cursor:default}
/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
/* Mobile */
@media(max-width:640px){
  .sidebar{display:none}
  .msg-row{max-width:90%}
  .messages{padding:12px}
  .input-bar{padding:10px 12px}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo"><span class="icon">&#x1F6D2;</span><h1>CommerceAgent</h1></div>
    <p class="sidebar-sub">智能电商客服系统</p>
    <div class="sidebar-status"><span class="status-dot" id="statusDot"></span><span id="statusText">未连接</span></div>
  </aside>
  <div class="main">
    <div class="header"><span class="header-dot"></span>智能客服对话</div>
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <textarea id="input" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"></textarea>
      <button class="send-btn" id="sendBtn" title="发送">&#10148;</button>
    </div>
  </div>
</div>
<script>
(function(){
  var WS_BASE = 'ws://localhost:8000/ws/chat/';
  var messagesEl = document.getElementById('messages');
  var inputEl = document.getElementById('input');
  var sendBtn = document.getElementById('sendBtn');
  var statusDot = document.getElementById('statusDot');
  var statusText = document.getElementById('statusText');

  var sessionId = (typeof crypto !== 'undefined' && crypto.randomUUID)
    ? crypto.randomUUID()
    : 'sess-' + Math.random().toString(36).slice(2);

  var ws = null;
  var currentBotRow = null;
  var currentBotBubble = null;
  var botContent = '';

  function setStatus(connected) {
    statusDot.className = 'status-dot' + (connected ? ' connected' : '');
    statusText.textContent = connected ? '已连接' : '未连接';
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(t) {
    var d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
  }

  function addRow(side, html) {
    var row = document.createElement('div');
    row.className = 'msg-row ' + side;
    var avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = side === 'user' ? '\u{1F464}' : '\u{1F916}';
    var bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = html;
    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return { row: row, bubble: bubble };
  }

  function addTyping() {
    var result = addRow('bot', '<div class="typing-indicator"><span></span><span></span><span></span></div>');
    currentBotRow = result.row;
    currentBotBubble = result.bubble;
    botContent = '';
  }

  function finalizeBotRow(suggestions) {
    if (currentBotBubble && botContent) {
      currentBotBubble.innerHTML = escapeHtml(botContent).replace(/\n/g, '<br>');
    }
    if (suggestions && suggestions.length && currentBotRow) {
      var wrap = document.createElement('div');
      wrap.className = 'suggestions';
      for (var i = 0; i < suggestions.length; i++) {
        (function(text) {
          var btn = document.createElement('button');
          btn.className = 'suggestion-btn';
          btn.textContent = text;
          btn.addEventListener('click', function() { send(text); });
          wrap.appendChild(btn);
        })(suggestions[i]);
      }
      currentBotRow.querySelector('.msg-bubble').appendChild(wrap);
    }
    currentBotRow = null;
    currentBotBubble = null;
    botContent = '';
    scrollBottom();
  }

  function send(text) {
    text = (text || inputEl.value).trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    addRow('user', escapeHtml(text).replace(/\n/g, '<br>'));
    ws.send(text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
  }

  function connect() {
    ws = new WebSocket(WS_BASE + sessionId);

    ws.onopen = function() {
      setStatus(true);
      addRow('bot', '欢迎使用 CommerceAgent 智能客服! 我可以帮您查询订单、处理退换货、推荐商品等。请问有什么可以帮您？');
    };

    ws.onmessage = function(e) {
      var msg;
      try { msg = JSON.parse(e.data); } catch(_) { return; }

      switch (msg.type) {
        case 'typing':
          if (!currentBotRow) addTyping();
          break;

        case 'chunk':
          if (msg.data && msg.data.content_delta) {
            botContent += msg.data.content_delta;
            if (currentBotBubble) {
              currentBotBubble.innerHTML = escapeHtml(botContent).replace(/\n/g, '<br>');
              scrollBottom();
            }
          }
          break;

        case 'done':
          finalizeBotRow(msg.data && msg.data.suggestions);
          break;

        case 'error':
          if (currentBotRow) {
            currentBotBubble.innerHTML = '<span style="color:#EF4444">出错了: ' + escapeHtml(msg.data.message || '未知错误') + '</span>';
          } else {
            addRow('bot', '<span style="color:#EF4444">出错了: ' + escapeHtml(msg.data.message || '未知错误') + '</span>');
          }
          currentBotRow = null;
          currentBotBubble = null;
          botContent = '';
          break;
      }
    };

    ws.onclose = function() {
      setStatus(false);
      setTimeout(connect, 3000);
    };

    ws.onerror = function() {
      setStatus(false);
    };
  }

  sendBtn.addEventListener('click', function() { send(); });

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  inputEl.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  connect();
})();
</script>
</body>
</html>
