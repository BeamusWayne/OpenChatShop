groups:
  - name: openchatshop_alerts
    rules:
      - alert: HighErrorRate
        expr: >
          sum(rate(openchatshop_chat_requests_total{status="error"}[5m]))
          /
          sum(rate(openchatshop_chat_requests_total[5m]))
          > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate exceeds 1% for more than 5 minutes."

      - alert: HighLatency
        expr: >
          histogram_quantile(0.99, sum(rate(openchatshop_chat_duration_seconds_bucket[5m])) by (le))
          > 3.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "P99 latency exceeds 3 seconds for more than 5 minutes."

      - alert: QueueBacklog
        expr: openchatshop_handoff_queue_size > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Handoff queue backlog"
          description: "More than 50 sessions waiting in the human-agent handoff queue for over 5 minutes."
